name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java JDK (For Gradle 9+ & SDK 34)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17' # 🔴 ফিক্সড: JVM 17 দেওয়া হলো

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🛠️ Install Cordova Globally
      run: npm install -g cordova

    - name: 📦 Install Project Dependencies
      run: npm install

    - name: 🤖 Add Android Platform (Latest)
      run: cordova platform add android@13.0.0 # 🔴 ফিক্সড: Android SDK 34 সাপোর্টের জন্য লেটেস্ট প্ল্যাটফর্ম

    - name: 🚀 Build Release APK
      run: cordova build android --release

    - name: 📤 Upload Ready APK
      uses: actions/upload-artifact@v4
      with:
        name: Priyanka-Study-App-Pro
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
