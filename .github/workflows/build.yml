name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java JDK (For Gradle 9+ & SDK 34)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🛠️ Install Cordova Globally
      run: npm install -g cordova

    - name: 📦 Install Project Dependencies
      run: npm install

    - name: 🤖 Add Android Platform
      run: cordova platform add android@13.0.0

    - name: 🚀 Build Debug APK (ইন্সটল করার জন্য সবচেয়ে ভালো)
      run: cordova build android --debug

    - name: 📤 Upload Ready APK
      uses: actions/upload-artifact@v4
      with:
        name: Priyanka-Study-App-APK
        # 🔴 ম্যাজিক সার্চ: অ্যাপটা যে ফোল্ডারেই তৈরি হোক না কেন, এই লাইনটা সেটাকে খুঁজে বের করে নেবে!
        path: platforms/android/**/*.apk
