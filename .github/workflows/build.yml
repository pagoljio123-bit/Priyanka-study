name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 🔴 ম্যাজিক বাটন: আপনি চাইলে গিটহাব থেকে এক ক্লিকেই বিল্ড শুরু করতে পারবেন!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java JDK (For Android SDK 33)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11' # Cordova 12 এর জন্য Java 11 একদম পারফেক্ট

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🛠️ Install Cordova Globally
      run: npm install -g cordova

    - name: 📦 Install Project Dependencies
      run: npm install

    - name: 🤖 Add Android Platform
      # আপনার config.xml এর সাথে ম্যাচ করে Android 12.0.1 প্ল্যাটফর্ম দেওয়া হলো
      run: cordova platform add android@12.0.1 

    - name: 🚀 Build Release APK
      run: cordova build android --release

    - name: 📤 Upload Ready APK
      uses: actions/upload-artifact@v4
      with:
        name: Priyanka-Study-App-Pro
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
