<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 Priyanka Study - প্রিয়াঙ্কার পড়াশোনার অ্যাপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; }
        .title-font { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(20px); }
        .heart { animation: heartbeat 1.8s infinite; }
        @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .mobile-card { transition: transform 0.3s; }
        .mobile-card:active { transform: scale(0.95); }
    </style>
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22Priyanka%20Study%22,
        %22short_name%22:%22Priyanka%22,
        %22start_url%22:%22.%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%231f1233%22,
        %22theme_color%22:%22%23ec4899%22,
        %22icons%22:[{%22src%22:%22https://picsum.photos/id/1011/192/192%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
    }">
</head>
<body class="bg-gradient-to-br from-purple-950 to-pink-950 text-white min-h-screen">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-sm">
            <div class="text-8xl mb-6 heart text-center">📚</div>
            <h1 class="title-font text-4xl text-center font-bold text-pink-200">Priyanka Study</h1>
            <p class="text-center text-pink-300 text-lg mt-1">প্রিয়াঙ্কার ৪০/৪০ অ্যাপ ❤️</p>
            
            <div class="mt-10 space-y-6">
                <input id="userId" type="text" value="priyanka" class="w-full px-6 py-5 text-2xl bg-white/10 rounded-3xl text-center" placeholder="ইউজার আইডি">
                <input id="password" type="password" value="1234" class="w-full px-6 py-5 text-2xl bg-white/10 rounded-3xl text-center" placeholder="পাসওয়ার্ড">
                <button onclick="handleLogin()" class="w-full py-6 text-2xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl active:scale-95">প্রবেশ করো 📖</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-black/50 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-3xl">☰</button>
                <div class="title-font text-3xl text-pink-200">Priyanka Study</div>
            </div>
            <button onclick="checkForUpdate()" class="text-xl">🔄</button>
        </header>

        <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-black/90 z-50 transform -translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">সাবজেক্ট</h2>
                <button onclick="toggleSidebar()" class="text-3xl">✕</button>
            </div>
            <div id="subjectList" class="space-y-3"></div>
            
            <div id="adminOnly" class="hidden mt-12 pt-8 border-t border-white/20">
                <button onclick="showSection('uploadSection');toggleSidebar()" 
                        class="w-full py-5 bg-pink-600 rounded-3xl text-xl font-medium">📤 আপলোড করো</button>
            </div>
            
            <button onclick="logout()" class="mt-auto absolute bottom-6 left-6 right-6 py-4 bg-red-600/80 rounded-3xl text-xl">লগআউট</button>
        </div>

        <div class="p-6 pt-4">
            <div id="uploadSection" class="section hidden">
                <h2 class="text-3xl font-bold mb-6">📤 নতুন ফাইল আপলোড</h2>
                <input type="file" id="uploadInput" accept=".pdf,.html" class="block w-full text-lg py-4">
                <select id="uploadSubject" class="w-full mt-4 py-4 bg-white/10 rounded-3xl text-xl"></select>
                <select id="uploadCategory" class="w-full mt-4 py-4 bg-white/10 rounded-3xl text-xl">
                    <option value="Notes">📖 Notes</option>
                    <option value="MockTest">🧪 Mock Test HTML</option>
                </select>
                <input id="uploadTitle" type="text" placeholder="ফাইলের নাম" class="w-full mt-4 py-4 bg-white/10 rounded-3xl text-xl px-6">
                <button onclick="uploadMaterial()" class="mt-8 w-full py-6 bg-pink-600 rounded-3xl text-2xl font-bold">আপলোড করো</button>
            </div>

            <div id="materialsSection" class="section">
                <h2 id="currentSubjectTitle" class="text-3xl font-bold mb-6"></h2>
                <input id="searchBox" onkeyup="filterMaterials()" placeholder="সার্চ করো..." 
                       class="w-full py-5 px-6 bg-white/10 rounded-3xl text-xl mb-6">
                <div id="materialsGrid" class="grid grid-cols-1 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="hidden fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="w-full h-full flex flex-col">
            <div class="bg-black/80 p-4 flex justify-between items-center">
                <button onclick="closeModal()" class="text-3xl">←</button>
                <button onclick="downloadCurrentFile()" class="px-8 py-3 bg-white/20 rounded-3xl text-xl">⬇️ ডাউনলোড</button>
                <button onclick="toggleFullScreen()" class="px-8 py-3 bg-white/20 rounded-3xl text-xl">⛶ ফুলস্ক্রিন</button>
            </div>
            <div id="modalBody" class="flex-1 w-full overflow-auto bg-white text-black"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allMaterials = [];
        let currentSubject = "Education";
        let currentViewingMaterial = null;
        const MASTER_PASSWORD = "7602594913";
        const SUBJECTS = ["Education", "Bangla", "Philosophy", "Geography", "EVS"];

        function handleLogin() {
            const id = document.getElementById("userId").value.trim().toLowerCase();
            if ((id === "admin" || id === "priyanka") && document.getElementById("password").value === "1234") {
                currentUser = { id: id };
                localStorage.setItem("priyankaUser", JSON.stringify(currentUser));
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                if (id === "admin") document.getElementById("adminOnly").classList.remove("hidden");
                loadMaterials();
                renderSubjects();
                switchSubject("Education");
            } else alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করো ❤️");
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("-translate-x-full");
        }

        function renderSubjects() {
            const container = document.getElementById("subjectList");
            container.innerHTML = "";
            SUBJECTS.forEach(sub => {
                const btn = document.createElement("button");
                btn.className = `w-full text-left px-6 py-6 text-2xl rounded-3xl ${sub === currentSubject ? 'bg-pink-600 text-white' : 'bg-white/10'}`;
                btn.textContent = sub === "EVS" ? "Environment" : sub;
                btn.onclick = () => { switchSubject(sub); toggleSidebar(); };
                container.appendChild(btn);
            });
        }

        function switchSubject(sub) {
            currentSubject = sub;
            document.getElementById("currentSubjectTitle").textContent = sub + " 📚";
            renderSubjects();
            renderMaterials();
            // হাইড আপলোড সেকশন, শো ম্যাটেরিয়াল সেকশন
            document.getElementById("uploadSection").classList.add("hidden");
            document.getElementById("materialsSection").classList.remove("hidden");
        }
        
        function showSection(sectionId) {
            document.getElementById("uploadSection").classList.add("hidden");
            document.getElementById("materialsSection").classList.add("hidden");
            document.getElementById(sectionId).classList.remove("hidden");
        }

        function uploadMaterial() {
            const file = document.getElementById("uploadInput").files[0];
            if (!file) return alert("ফাইল সিলেক্ট করো");
            const reader = new FileReader();
            reader.onload = function(e) {
                allMaterials.push({
                    id: Date.now(),
                    title: document.getElementById("uploadTitle").value || file.name,
                    subject: document.getElementById("uploadSubject").value,
                    category: document.getElementById("uploadCategory").value,
                    type: file.name.endsWith(".pdf") ? "pdf" : "html",
                    data: e.target.result
                });
                localStorage.setItem("priyankaMaterials", JSON.stringify(allMaterials));
                alert("✅ আপলোড হয়েছে! প্রিয়াঙ্কা এখন পড়তে পারবে");
                switchSubject(document.getElementById("uploadSubject").value);
            };
            if (file.name.endsWith(".pdf")) reader.readAsDataURL(file);
            else reader.readAsText(file);
        }

        function loadMaterials() {
            allMaterials = JSON.parse(localStorage.getItem("priyankaMaterials")) || [];
            const select = document.getElementById("uploadSubject");
            select.innerHTML = ""; // আগের অপশন ক্লিয়ার করার জন্য
            SUBJECTS.forEach(s => {
                let opt = document.createElement("option"); opt.value = s; opt.textContent = s;
                select.appendChild(opt);
            });
        }

        function renderMaterials() {
            const grid = document.getElementById("materialsGrid");
            grid.innerHTML = "";
            allMaterials.filter(m => m.subject === currentSubject).forEach(mat => {
                const card = document.createElement("div");
                card.className = "mobile-card glass p-6 rounded-3xl cursor-pointer";
                card.innerHTML = `
                    <div class="text-xl font-medium">${mat.title}</div>
                    <div class="text-sm text-pink-300 mt-2">${mat.category}</div>
                `;
                card.onclick = () => openMaterial(mat);
                grid.appendChild(card);
            });
        }

        function filterMaterials() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allMaterials.filter(m => m.subject === currentSubject && m.title.toLowerCase().includes(term));
            const grid = document.getElementById("materialsGrid");
            grid.innerHTML = "";
            filtered.forEach(mat => {
                const card = document.createElement("div");
                card.className = "mobile-card glass p-6 rounded-3xl cursor-pointer";
                card.innerHTML = `
                    <div class="text-xl font-medium">${mat.title}</div>
                    <div class="text-sm text-pink-300 mt-2">${mat.category}</div>
                `;
                card.onclick = () => openMaterial(mat);
                grid.appendChild(card);
            });
        }

        function openMaterial(mat) {
            currentViewingMaterial = mat;
            const body = document.getElementById("modalBody");
            body.innerHTML = mat.type === "pdf" 
                ? `<embed src="${mat.data}" class="w-full h-full">` 
                : `<iframe srcdoc='${mat.data.replace(/'/g, "&apos;")}' class="w-full h-full border-0"></iframe>`;
            document.getElementById("viewModal").classList.remove("hidden");
            if (mat.category === "MockTest") toggleFullScreen(true);
        }

        function closeModal() {
            document.getElementById("viewModal").classList.add("hidden");
            document.exitFullscreen?.();
        }

        function toggleFullScreen(force) {
            if (force || !document.fullscreenElement) {
                document.getElementById("modalBody").requestFullscreen?.();
            }
        }

        function downloadCurrentFile() {
            const pass = prompt("🔒 মাস্টার পাসওয়ার্ড দাও (7602594913)");
            if (pass !== "7602594913") return alert("❌ ভুল পাসওয়ার্ড!");
            
            const mat = currentViewingMaterial;
            const a = document.createElement("a");
            if (mat.type === "pdf") {
                a.href = mat.data;
                a.download = mat.title + ".pdf";
            } else {
                const blob = new Blob([mat.data], {type:"text/html"});
                a.href = URL.createObjectURL(blob);
                a.download = mat.title + ".html";
            }
            a.click();
        }

        function checkForUpdate() {
            if (confirm("নতুন আপডেট চেক করব?")) {
                alert("✅ আপডেট হয়েছে! অ্যাপ বন্ধ করে আবার খোলো ❤️");
                location.reload();
            }
        }

        function logout() {
            if (confirm("লগআউট করবি?")) {
                localStorage.removeItem("priyankaUser");
                location.reload();
            }
        }

        window.onload = () => {
            tailwind.config = { content: ["*"] };
            const saved = localStorage.getItem("priyankaUser");
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                if (currentUser.id === "admin") document.getElementById("adminOnly").classList.remove("hidden");
            }
            loadMaterials();
            renderSubjects();
            switchSubject("Education");
        };
    </script>
</body>
</html>
